<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electronics Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>⚡ Dawit Electronics Store</h1>

  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
    <span id="cart">🛒 Items: 0 | 💰 Total: 0 ETB</span>
    
<section class="products">

  <div class="card">
    <img src="https://via.placeholder.com/150" alt="Phone">
    <h3>Smartphone</h3>
    <p>15,000 ETB</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150" alt="Laptop">
    <h3>Laptop</h3>
    <p>45,000 ETB</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150" alt="Headphones">
    <h3>Headphones</h3>
    <p>2,500 ETB</p>
    <button>Add to Cart</button>
  </div>

</section>

<script src="script.js"></script>

</body>
  </html>
